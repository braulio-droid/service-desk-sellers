function rCardModal(){var c=state.cards.filter(function(x){return x.id===state.cardAbertoId;})[0];if(!c)return'';var infos=c.infos||[],pedidos=c.pedidos||[],anexos=c.anexos||[],h='<div class="modal-overlay"><div class="modal"><div class="modal-header"><div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;"><span style="font-family:ui-monospace,monospace;font-size:13px;">'+c.id+'</span><span class="badge '+AREAS[c.area].cls+'">'+AREAS[c.area].label+'</span><span class="badge '+PRIORIDADES[c.prioridade].cls+'">'+c.prioridade+'</span></div><h2 style="margin-top:4px;">'+escapeHtml(c.cliente)+'</h2><p class="tiny">Solicitado por '+escapeHtml(c.solicitante)+' via '+escapeHtml(c.canal)+' em '+c.criadoEm+'</p></div><button class="modal-close" data-action="close-card">x</button></div><div class="modal-body"><div class="grid-3"><div><label class="label">Status</label><select class="select" data-action="card-status">'+STATUS_LIST.map(function(s){return'<option'+(c.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div><div><label class="label">Prioridade</label><select class="select" data-action="card-prio">'+Object.keys(PRIORIDADES).map(function(k){return'<option'+(c.prioridade===k?' selected':'')+'>'+k+'</option>';}).join('')+'</select></div><div><label class="label">SLA (horas)</label><input type="number" class="input" min="1" value="'+(c.slaHoras||'')+'" data-action="card-sla" placeholder="'+SLA_PADRAO[c.prioridade]+'"></div></div><div class="col" style="gap:6px;margin-top:12px;"><div class="fca-block fca-fato"><span class="lab">F - Fato</span><p>'+escapeHtml(c.fato||c.descricao)+'</p></div><div class="fca-block fca-causa"><span class="lab">C - Causa</span><p>'+escapeHtml(c.causa||'(nao registrado)')+'</p></div><div class="fca-block fca-acao"><span class="lab">A - Acao</span><p>'+escapeHtml(c.acao||'(nao registrado)')+'</p></div></div><div class="surface-sm" style="margin-top:12px;"><h3>Informacoes adicionais</h3><p class="tiny">Adicione observacoes durante a investigacao.</p>';if(infos.length)h+='<div class="col" style="gap:6px;margin:8px 0;">'+infos.map(function(i){return'<div class="note-card"><div class="when">'+new Date(i.timestamp).toLocaleString('pt-BR')+'</div><div class="what">'+escapeHtml(i.texto)+'</div></div>';}).join('')+'</div>';else h+='<p class="tiny" style="color:#94a3b8;font-style:italic;margin:8px 0;">Nenhuma informacao registrada.</p>';h+='<textarea class="textarea" rows="2" id="info-input" placeholder="Adicione uma observacao..."></textarea><button class="btn btn-primary btn-sm" style="margin-top:6px;" data-action="add-info">Adicionar nota</button></div><div class="surface-sm" style="margin-top:12px;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><div><h3>Pedidos de retorno</h3><p class="tiny">Solicitar status para o time <b>'+AREAS[c.area].label+'</b>.</p></div>'+(!state.pedidoRetornoAberto?'<button class="btn btn-warn btn-sm" data-action="abrir-pedido">+ Solicitar retorno do '+AREAS[c.area].label+'</button>':'')+'</div>';if(state.pedidoRetornoAberto)h+='<div style="margin-top:10px;padding:10px;background:#fff;border:1px solid #fde68a;border-radius:6px;"><label class="label">Mensagem para o time '+AREAS[c.area].label+'</label><textarea class="textarea" rows="3" id="pedido-input" placeholder="Ola, time '+AREAS[c.area].label+'. Pode atualizar o status? O cliente '+escapeHtml(c.cliente)+' esta aguardando."></textarea><div style="display:flex;gap:6px;margin-top:6px;"><button class="btn btn-success btn-sm" data-action="registrar-pedido">Registrar pedido</button><button class="btn btn-secondary btn-sm" data-action="fechar-pedido">Cancelar</button></div></div>';if(pedidos.length)h+='<div class="col" style="gap:6px;margin-top:8px;">'+pedidos.map(function(p,idx){return'<div class="pedido-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;"><div class="tiny">'+new Date(p.timestamp).toLocaleString('pt-BR')+' - time <b>'+escapeHtml(p.areaLabel)+'</b></div><select class="badge badge-status" style="padding:2px 6px;font-size:10px;cursor:pointer;" data-action="pedido-status" data-idx="'+idx+'">'+['Pendente','Em analise pelo time','Respondido','Sem resposta'].map(function(s){return'<option'+(p.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div><div class="what" style="margin-top:6px;">'+escapeHtml(p.mensagem)+'</div></div>';}).join('')+'</div>';else if(!state.pedidoRetornoAberto)h+='<p class="tiny" style="color:#94a3b8;font-style:italic;margin-top:8px;">Nenhum pedido registrado.</p>';h+='</div>';if(anexos.length)h+='<div class="surface-sm" style="margin-top:12px;"><h3>Anexos ('+anexos.length+')</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">'+anexos.map(function(a){var ic=iconeArquivo(a.tipo);return'<div class="file-card">'+(a.tipo==='imagem'&&a.dataUrl?'<img class="file-thumb" src="'+a.dataUrl+'">':'<div class="file-icon '+ic.c+'">'+ic.l+'</div>')+'<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(a.nome)+'</div><div class="tiny">'+fmtTam(a.tamanho)+'</div></div></div>';}).join('')+'</div></div>';return h+'</div><div class="modal-footer"><button class="btn btn-secondary" data-action="close-card">Fechar</button></div></div></div>';}
document.addEventListener('click',function(ev){var dz=ev.target.closest&&ev.target.closest('#dropzone');if(dz){var fi=$('#file-input');if(fi)fi.click();return;}var el=ev.target.closest&&ev.target.closest('[data-action]');if(!el)return;var a=el.getAttribute('data-action'),CK=['set-tab','set-sintoma','set-area-manual','remover-arquivo','abrir-preview','close-preview','copy-preview','registrar-local','enviar-n8n','enviar-planilha','abrir-card','close-card','add-info','abrir-pedido','fechar-pedido','registrar-pedido','copy-link','copy-convite'];if(CK.indexOf(a)!==-1)handle(a,el,ev);});
document.addEventListener('change',function(ev){if(ev.target.id==='file-input'){adicionarArquivos(ev.target.files);ev.target.value='';return;}if(ev.target.id==='aprov-check'){state.aprovacaoConfirmada=ev.target.checked;render();return;}var el=ev.target.closest&&ev.target.closest('[data-action]');if(!el)return;var a=el.getAttribute('data-action'),CH=['set-canal','set-impacto','set-urgencia','set-abrangencia','set-prio','set-status','set-filtro-area','set-filtro-prioridade','set-filtro-status','card-status','card-prio','card-sla','pedido-status','set-n8n-url','set-n8n-secret','set-sheet-url'];if(CH.indexOf(a)!==-1)handle(a,el,ev);});
document.addEventListener('input',function(ev){var el=ev.target.closest&&ev.target.closest('[data-action]');if(el&&el.getAttribute('data-action')==='set-busca'){state.busca=el.value;var pos=0;try{pos=el.selectionStart;}catch(e){}render();var ne=$('#busca-input');if(ne){try{ne.focus();ne.setSelectionRange(pos,pos);}catch(e){}}return;}if(el&&el.getAttribute('data-action')==='set-n8n-url'){state.n8nWebhookUrl=el.value;}if(el&&el.getAttribute('data-action')==='set-n8n-secret'){state.n8nSecret=el.value;}if(el&&el.getAttribute('data-action')==='set-sheet-url'){state.sheetWebhookUrl=el.value;}});
document.addEventListener('dragover',function(ev){var dz=ev.target.closest&&ev.target.closest('#dropzone');if(dz){ev.preventDefault();dz.classList.add('over');}});
document.addEventListener('dragleave',function(ev){var dz=ev.target.closest&&ev.target.closest('#dropzone');if(dz)dz.classList.remove('over');});
document.addEventListener('drop',function(ev){var dz=ev.target.closest&&ev.target.closest('#dropzone');if(dz){ev.preventDefault();dz.classList.remove('over');adicionarArquivos(ev.dataTransfer.files);}});
function handle(a,el,ev){
if(a==='set-tab'){ev.preventDefault();setState({aba:el.getAttribute('data-tab')});return;}
if(a==='set-sintoma'){setState({sintoma:el.getAttribute('data-sintoma'),areaManual:''});return;}
if(a==='set-area-manual'){var ar=el.getAttribute('data-area'),sug=(SINTOMAS.filter(function(s){return s.id===state.sintoma;})[0]||{}).area;setState({areaManual:ar===sug?'':ar});return;}
if(a==='set-canal'){captureFormValues();state.form.canalEntrada=el.value;render();return;}
if(a==='set-impacto'){captureFormValues();state.impacto=el.value;render();return;}
if(a==='set-urgencia'){captureFormValues();state.urgencia=el.value;render();return;}
if(a==='set-abrangencia'){captureFormValues();state.abrangencia=el.value;render();return;}
if(a==='remover-arquivo'){removerArquivo(el.getAttribute('data-id'));return;}
if(a==='abrir-preview'){abrirPreview();return;}
if(a==='close-preview'){setState({previewAberta:false,aprovacaoConfirmada:false,envioStatus:null});return;}
if(a==='copy-preview'){var ta=$('#preview-md');if(ta&&navigator.clipboard)navigator.clipboard.writeText(ta.value);return;}
if(a==='registrar-local'){registrarLocal();return;}
if(a==='enviar-n8n'){enviarN8N();return;}
if(a==='enviar-planilha'){enviarPlanilha();return;}
if(a==='abrir-card'){setState({cardAbertoId:el.getAttribute('data-id')});return;}
if(a==='close-card'){setState({cardAbertoId:null,pedidoRetornoAberto:false});return;}
if(a==='set-prio'){updateCard(el.getAttribute('data-id'),{prioridade:el.value});return;}
if(a==='set-status'){updateCard(el.getAttribute('data-id'),{status:el.value});return;}
if(a==='card-status'){updateCard(state.cardAbertoId,{status:el.value});return;}
if(a==='card-prio'){updateCard(state.cardAbertoId,{prioridade:el.value});return;}
if(a==='card-sla'){updateCard(state.cardAbertoId,{slaHoras:el.value?Number(el.value):null});return;}
if(a==='set-filtro-area'){setState({filtroArea:el.value});return;}
if(a==='set-filtro-prioridade'){setState({filtroPrioridade:el.value});return;}
if(a==='set-filtro-status'){setState({filtroStatus:el.value});return;}
if(a==='add-info'){var inp=$('#info-input');if(!inp||!inp.value.trim())return;var card=state.cards.filter(function(x){return x.id===state.cardAbertoId;})[0];if(!card)return;updateCard(card.id,{infos:(card.infos||[]).concat([{timestamp:new Date().toISOString(),texto:inp.value.trim()}])});return;}
if(a==='abrir-pedido'){setState({pedidoRetornoAberto:true});return;}
if(a==='fechar-pedido'){setState({pedidoRetornoAberto:false});return;}
if(a==='registrar-pedido'){var inp2=$('#pedido-input');if(!inp2||!inp2.value.trim())return;var card2=state.cards.filter(function(x){return x.id===state.cardAbertoId;})[0];if(!card2)return;updateCard(card2.id,{pedidos:(card2.pedidos||[]).concat([{timestamp:new Date().toISOString(),area:card2.area,areaLabel:AREAS[card2.area].label,mensagem:inp2.value.trim(),status:'Pendente'}])});setState({pedidoRetornoAberto:false});return;}
if(a==='pedido-status'){var card3=state.cards.filter(function(x){return x.id===state.cardAbertoId;})[0];if(!card3)return;var idx=Number(el.getAttribute('data-idx'));updateCard(card3.id,{pedidos:(card3.pedidos||[]).map(function(p,i){return i===idx?Object.assign({},p,{status:el.value}):p;})});return;}
if(a==='copy-link'){var lk=gerarLink();if(navigator.clipboard)navigator.clipboard.writeText(lk);alert('Link copiado!\n\n'+lk);return;}
if(a==='copy-convite'){var url=gerarLink(),conv='Ola time,\n\nUse o Service Desk para abrir cards de suporte com triagem FCA (Fato, Causa, Acao):\n\n'+url+'\n\nO formulario classifica automaticamente por area, calcula prioridade e SLA, aceita anexos (PDF, imagens, planilhas) e gera previa para revisao antes de criar o card no ClickUp via N8N.';if(navigator.clipboard)navigator.clipboard.writeText(conv);alert('Convite copiado!');return;}
}
loadHash();render();
})();
